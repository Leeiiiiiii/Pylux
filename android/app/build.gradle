plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'kotlin-parcelize'
    id 'kotlin-kapt'
}

// NOTE: android/app/src/main/res/raw/disclaimer.txt is a copy of gui/res/license/disclaimer.txt.
// If you update the disclaimer, update both files.
def rootCMakeLists = "../../CMakeLists.txt"
def rootCMakeListsContent = file(rootCMakeLists).text
static def grepVersionComponent(content, varname) {
    def match = content =~ /set\($varname ([0-9]+)\)/
    if(!match.find())
        throw new RuntimeException("Failed to find $varname in CMakeLists.txt")
    return match.group(1)
}
def chiakiVersionMajor = grepVersionComponent(rootCMakeListsContent, "CHIAKI_VERSION_MAJOR")
def chiakiVersionMinor = grepVersionComponent(rootCMakeListsContent, "CHIAKI_VERSION_MINOR")
def chiakiVersionPatch = grepVersionComponent(rootCMakeListsContent, "CHIAKI_VERSION_PATCH")
def chiakiVersion = "$chiakiVersionMajor.$chiakiVersionMinor.$chiakiVersionPatch"
println("Determined Chiaki Version: $chiakiVersion")

// versionName + default versionCode are read from repo root CMakeLists.txt (CHIAKI_VERSION_*), not duplicated here.
// Google Play: versionCode must increase on each upload. Default = encoded Pylux semver
// (same as iOS CURRENT_PROJECT_VERSION / macOS CFBundleVersion in CI): MAJOR*10000+MINOR*100+PATCH.
// Optional override: env ANDROID_VERSION_CODE or -PandroidVersionCode= (e.g. one-off migration).
// Parameters required: a top-level `def resolveAndroidVersionCode()` is a method, not a closure;
// unqualified names like chiakiVersionMajor resolve against Project, not script locals (CI failed with MissingPropertyException).
def resolveAndroidVersionCode(String major, String minor, String patch) {
    def envVc = System.getenv("ANDROID_VERSION_CODE")
    if (envVc != null && !envVc.trim().isEmpty()) {
        return envVc.trim().toInteger()
    }
    def propVc = project.findProperty("androidVersionCode")
    if (propVc != null && !propVc.toString().trim().isEmpty()) {
        return propVc.toString().trim().toInteger()
    }
    def maj = major.toInteger()
    def min = minor.toInteger()
    def pat = patch.toInteger()
    return maj * 10000 + min * 100 + pat
}
def androidVersionCode = resolveAndroidVersionCode(chiakiVersionMajor, chiakiVersionMinor, chiakiVersionPatch)
println("Android versionCode: $androidVersionCode (from ${chiakiVersion})")

// Fastlane reads this via ./gradlew :app:printPyluxVersionCode — must not live only in afterEvaluate
// (task can be missing or output unreliable for single-task invocations).
tasks.register("printPyluxVersionCode") {
    doLast {
        println("PYLUX_VERSION_CODE=" + androidVersionCode)
    }
}


android {
    namespace "com.pylux.stream"
    compileSdk 35
    
    // Specify NDK version - r28+ required for 16KB page size alignment
    // NDK r28+ aligns ELF segments to 16KB by default for compatibility with 16KB page size devices
    ndkVersion "28.2.13676358" // NDK r28.2 - provides 16KB alignment by default
    
    defaultConfig {
        applicationId "com.pylux.stream"
        minSdk 24
        targetSdk 35
        versionCode androidVersionCode
        versionName chiakiVersion
        ndk {
            // For local development: arm64-v8a only
            // For production builds: include all ABIs (armeabi-v7a, arm64-v8a, x86, x86_64)
            // The build script can override this with -Pandroid.injected.build.abi
            abiFilters "arm64-v8a", "armeabi-v7a", "x86", "x86_64"
        }
        externalNativeBuild {
            cmake {
                arguments "-DCHIAKI_ENABLE_TESTS=OFF",
                        "-DCHIAKI_ENABLE_CLI=OFF",
                        "-DCHIAKI_ENABLE_GUI=OFF",
                        "-DCHIAKI_ENABLE_SETSU=OFF",
                        "-DCHIAKI_ENABLE_ANDROID=ON",
                        "-DCHIAKI_ENABLE_FFMPEG_DECODER=OFF",
                        "-DCHIAKI_ENABLE_PI_DECODER=OFF",
                        "-DCHIAKI_LIB_ENABLE_OPUS=ON",
                        "-DCHIAKI_LIB_ENABLE_MBEDTLS=ON",
                        "-DCHIAKI_LIB_MBEDTLS_EXTERNAL_PROJECT=ON",
                        "-DCHIAKI_ENABLE_RUDP=ON",
                        "-DCHIAKI_ENABLE_STEAM_SHORTCUT=OFF",
                        "-DCHIAKI_ENABLE_STEAMDECK_NATIVE=OFF",
                        "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON",
                        "-DBUILD_TESTING=OFF",
                        "-DBUILD_EXAMPLES=OFF"
            }
        }
    }
    buildFeatures {
        viewBinding true
        buildConfig true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = "21"
    }

    sourceSets {
        main {
            res.srcDirs += "$buildDir/generated/donation-phrases-res"
        }
    }
    
    kapt {
        correctErrorTypes true
        arguments {
            arg("room.schemaLocation", "$projectDir/schemas")
            arg("room.incremental", "true")
        }
    }
    externalNativeBuild {
        cmake {
            version "3.30.4"
            path rootCMakeLists
        }
    }
    signingConfigs {
        release
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    // Ensure native libraries are NOT compressed in APK (required for 16KB alignment)
    // Modern AGP automatically stores native libraries uncompressed by default, but we explicitly ensure it
    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }


    Properties properties = new Properties()
    def propertiesFile = file("../local.properties")
    if (propertiesFile.exists()) {
        properties.load(propertiesFile.newDataInputStream())
    }

	if(properties.containsKey("chiakiKeystore")) {
        println("Enabling Local Signing")
        buildTypes.release.signingConfig = signingConfigs.release
        buildTypes.debug.signingConfig = signingConfigs.release
        signingConfigs.release.storeFile = file(properties.get("chiakiKeystore"))
        signingConfigs.release.storePassword = properties.get("chiakiKeystorePW")
        signingConfigs.release.keyAlias = properties.get("chiakiKeyAlias")
        signingConfigs.release.keyPassword = properties.get("chiakiKeyPW")
    } else {
        println("Signing not enabled")
    }
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).all {
    kotlinOptions {
        // Unsigned types are stable in Kotlin 1.9+, no experimental flag needed
        // freeCompilerArgs += "-Xuse-experimental=kotlin.ExperimentalUnsignedTypes"
    }
}

configurations.all {
    resolutionStrategy {
        force "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
        force "org.jetbrains.kotlin:kotlin-reflect:$kotlin_version"
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.0'
    implementation 'androidx.preference:preference-ktx:1.2.0'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.1'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.6.1'
    implementation 'androidx.lifecycle:lifecycle-reactivestreams-ktx:2.6.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.1'
    implementation 'androidx.lifecycle:lifecycle-reactivestreams-ktx:2.6.1'
    implementation "io.reactivex.rxjava2:rxjava:2.2.21"
    implementation "io.reactivex.rxjava2:rxkotlin:2.4.0"
    implementation 'io.reactivex.rxjava2:rxandroid:2.1.1'
    def room_version = "2.6.1"
    implementation "androidx.room:room-runtime:$room_version"
    implementation "androidx.room:room-ktx:$room_version"
    implementation "androidx.room:room-rxjava2:$room_version"
    kapt "androidx.room:room-compiler:$room_version"
    implementation "com.squareup.moshi:moshi:1.15.1"
    kapt "com.squareup.moshi:moshi-kotlin-codegen:1.15.1"
    implementation 'androidx.viewpager2:viewpager2:1.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'io.coil-kt:coil:2.4.0'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'

    // Play In-App Review (uses existing [Preferences.totalStreamTimeMs] from stream sessions; no extra timers)
    implementation 'com.google.android.play:review-ktx:2.0.2'
    // Play Billing 8.x Java API (no billing-ktx: that artifact targets Kotlin 2.2+ and forces a full Kotlin/Room/Moshi upgrade chain)
    implementation 'com.android.billingclient:billing:8.1.0'
    implementation 'com.google.zxing:core:3.5.3'
}

// Single source of truth: shared/donation_prompt_phrases.json → generated res/raw for R.raw.donation_prompt_phrases
tasks.register("syncDonationPhrases", Copy) {
    def src = file("$projectDir/../../shared/donation_prompt_phrases.json")
    doFirst {
        if (!src.exists()) {
            throw new GradleException("Missing donation phrases JSON: ${src.absolutePath}")
        }
    }
    from src
    into "$buildDir/generated/donation-phrases-res/raw"
}
tasks.named("preBuild").configure { dependsOn("syncDonationPhrases") }
