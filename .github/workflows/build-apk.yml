name: Build APK

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Install CMake 3.22.1
        run: sdkmanager "cmake;3.22.1"

      - name: Install protoc and Python grpc tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          python3 -m pip install grpcio-tools

      - name: Strip Windows-only Gradle property for CI
        working-directory: android
        run: sed -i '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/pylux-android.apk

      - name: Get commit message
        run: |
          COMMIT_MSG=$(git log -1 --format=%s)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Create tag
        run: |
          TAG=build-${SHORT_SHA}
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag -f $TAG
          git push -f origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Pylux Android ${{ env.TAG }}
          body: |
            **${{ env.COMMIT_MSG }}**

            Built from commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            Attached asset: `pylux-android.apk`

          files: release/pylux-android.apk
