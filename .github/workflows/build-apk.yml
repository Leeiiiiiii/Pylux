name: Build APK

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Install CMake 3.22.1
        run: sdkmanager "cmake;3.22.1"

      - name: Install protoc and Python grpc tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          python3 -m pip install grpcio-tools

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/pylux-android.apk

      - name: Create tag
        run: |
          TAG=auto-build-${GITHUB_RUN_NUMBER}
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Pylux Android ${{ env.TAG }}
          body: |
            ## Pylux Android Auto Build

            ### Fixes
            - Bloodborne now works — fixed PSNOW product ID conversion and streaming SKU selection
            - Fixed cloud store country mapping (FI→GB etc.) for unsupported PSNOW store regions
            - Session locale no longer overwrites user language preference
            - FEC recovery: corrupt frames no longer cascade into multi-second freezes
            - Ref-frame isolation: dropped frames don't poison future P-frame chain
            - Crypto key buffer increased to prevent exhaustion under load
            - Frame processor off-by-one fix

            ### APK
            Attached release asset: `pylux-android.apk`

          files: release/pylux-android.apk
